<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — OptiLux Patient Portal</title>
  <meta name="description" content="Create your free OptiLux account to schedule eye consultations, access digital prescriptions, and view order history." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <style>
    /* Premium Auth Styles */
    .auth-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 50% 50%, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      transition: background 0.3s ease;
      padding-top: var(--nav-height);
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
    }

    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 480px;
      padding: clamp(1.5rem, 5vw, 3rem);
      text-align: center;
      transition: var(--transition-base);
    }

    .auth-card-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--sapphire);
      background: rgba(42, 157, 143, 0.08);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      margin-bottom: var(--space-3);
    }

    .auth-card-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .auth-card-subtitle {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
      line-height: 1.5;
    }

    /* Social Buttons */
    .social-auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .btn-social-premium {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      height: 48px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: var(--text-sm);
      font-weight: 600;
      transition: var(--transition-fast);
      cursor: pointer;
      width: 100%;
    }

    .btn-social-premium:hover {
      background: var(--bg-tertiary);
      border-color: var(--silver-dark);
      transform: translateY(-1px);
    }

    .btn-social-premium:active {
      transform: translateY(0);
    }

    /* Email Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: var(--space-6) 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .auth-divider::before {
      margin-right: var(--space-4);
    }

    .auth-divider::after {
      margin-left: var(--space-4);
    }

    /* Form Groups */
    .form-group-premium {
      margin-bottom: var(--space-5);
      text-align: left;
    }

    [dir="rtl"] .form-group-premium {
      text-align: right;
    }

    .form-row-premium {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    .form-label-premium {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .input-icon-wrap-premium {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon-premium {
      position: absolute;
      margin-inline-start: var(--space-4);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .form-input-premium {
      width: 100%;
      height: 48px;
      padding-inline-start: 2.75rem;
      padding-inline-end: var(--space-4);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: var(--text-sm);
      transition: var(--transition-base);
    }

    .form-input-premium:focus {
      border-color: var(--sapphire);
      box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.12);
      background: var(--bg-secondary);
    }

    [dir="rtl"] .form-input-premium {
      padding-inline-start: 2.75rem;
      padding-inline-end: var(--space-4);
    }

    /* Password Toggle Icon */
    .input-toggle-premium {
      position: absolute;
      margin-inline-end: var(--space-4);
      inset-inline-end: 0;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    [dir="rtl"] .input-toggle-premium {
      margin-inline-end: 0;
      margin-inline-start: var(--space-4);
      inset-inline-end: auto;
      inset-inline-start: 0;
    }

    .input-toggle-premium:hover {
      color: var(--text-primary);
    }

    /* Custom Checkbox */
    .checkbox-row {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      margin-bottom: var(--space-6);
      font-size: var(--text-sm);
      text-align: left;
    }

    [dir="rtl"] .checkbox-row {
      text-align: right;
    }

    .checkbox-label-premium {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label-premium input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }

    .checkbox-custom {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checkbox-label-premium input:checked ~ .checkbox-custom {
      background: var(--sapphire);
      border-color: var(--sapphire);
    }

    .checkbox-custom::after {
      content: "✓";
      display: none;
    }

    .checkbox-label-premium input:checked ~ .checkbox-custom::after {
      display: block;
    }

    /* Password Strength Indicator */
    .strength-meter {
      margin-top: var(--space-2);
    }

    .strength-meter-bars {
      display: flex;
      gap: 4px;
      height: 4px;
    }

    .strength-bar {
      flex: 1;
      height: 100%;
      background: var(--border-color);
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    /* Strength levels colors */
    .strength-bar.very-weak {
      background: var(--rose);
    }

    .strength-bar.weak {
      background: #E07A5F;
    }

    .strength-bar.medium {
      background: var(--cyan);
    }

    .strength-bar.strong {
      background: #81B29A;
    }

    .strength-bar.very-strong {
      background: var(--emerald-light);
    }

    .strength-label {
      display: block;
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: var(--space-1);
      font-weight: 500;
    }

    /* Passwords Match Label */
    .pw-match-label {
      display: none;
      font-size: var(--text-xs);
      margin-top: var(--space-1);
      font-weight: 500;
    }

    .pw-match-label.match {
      color: var(--emerald-light);
      display: block;
    }

    .pw-match-label.no-match {
      color: var(--rose);
      display: block;
    }

    /* Submit Button & Spinner */
    .btn-primary-premium {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      height: 48px;
      background: var(--sapphire);
      color: #fff;
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-weight: 600;
      transition: var(--transition-base);
      box-shadow: 0 4px 12px rgba(42, 157, 143, 0.25);
      position: relative;
      overflow: hidden;
    }

    .btn-primary-premium:hover:not(:disabled) {
      background: var(--sapphire-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(42, 157, 143, 0.35);
    }

    .btn-primary-premium:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary-premium:disabled {
      background: var(--silver-dark);
      color: rgba(255, 255, 255, 0.6);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Spinner */
    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btn-spin 0.6s linear infinite;
      display: none;
    }

    @keyframes btn-spin {
      to { transform: rotate(360deg); }
    }

    .btn-primary-premium.loading .btn-spinner {
      display: inline-block;
    }

    .btn-primary-premium.loading span {
      opacity: 0.7;
    }

    /* Link Styles */
    .auth-links-footer {
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .auth-links-footer a {
      color: var(--sapphire);
      font-weight: 600;
    }

    .auth-links-footer a:hover {
      text-decoration: underline;
    }

    /* Errors */
    .form-error {
      display: none;
      font-size: var(--text-xs);
      color: var(--rose);
      margin-top: var(--space-1);
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .social-auth-grid {
        grid-template-columns: 1fr;
      }
      .form-row-premium {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</head>
<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="preloader-inner">
      <div class="preloader-logo">Opti<span>Lux</span></div>
      <div class="preloader-bar"><div class="preloader-bar-fill"></div></div>
      <div class="preloader-dots"><div class="preloader-dot"></div><div class="preloader-dot"></div><div class="preloader-dot"></div></div>
    </div>
  </div>
  
  <!-- Page Progress -->
  <div id="page-progress"></div>

  <div class="auth-page-wrapper">
    <!-- ═══ MINIMAL NAVBAR ═══ -->
    <nav class="navbar" role="navigation" aria-label="Authentication navigation">
      <div class="container nav-inner">
        <a href="index.html" class="nav-logo" aria-label="OptiLux Home">
          <div class="nav-logo-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="12" r="4"/><circle cx="18" cy="12" r="4"/><path d="M10 12h4"/><path d="M2 12h0.5"/><path d="M21.5 12h0.5"/></svg>
          </div>
          <div>
            <span class="nav-logo-text">Opti<span>Lux</span></span>
            <span class="nav-logo-sub">Precision Eyewear</span>
          </div>
        </a>

        <div class="nav-actions">
          <button class="nav-icon-btn" data-theme-toggle title="Toggle Dark Mode" aria-label="Toggle theme">
            <span class="icon-moon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
            <span class="icon-sun" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></span>
          </button>
          <button class="nav-icon-btn" data-rtl-toggle title="Toggle RTL" aria-label="Toggle RTL">RTL</button>
        </div>
      </div>
    </nav>

    <!-- ═══ MAIN AUTH SECTION ═══ -->
    <main class="auth-main" role="main">
      <div class="auth-card">
        <span class="auth-card-badge">Client Registration</span>
        <h2 class="auth-card-title">Create Your Account</h2>
        <p class="auth-card-subtitle">Join OptiLux and enjoy premium optical services, appointment management and personalized vision care.</p>

        <!-- Social Login buttons -->
        <div class="social-auth-grid">
          <a href="https://google.com" target="_blank" rel="noopener noreferrer" class="btn-social-premium" aria-label="Sign in with Google">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google</span>
          </a>
          <a href="https://apple.com" target="_blank" rel="noopener noreferrer" class="btn-social-premium" aria-label="Sign in with Apple">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.12.09 2.25-.56 2.94-1.39z"/>
            </svg>
            <span>Apple</span>
          </a>
        </div>

        <!-- Divider -->
        <div class="auth-divider">Or register with email</div>

        <!-- Signup Form -->
        <form data-form="signup" novalidate>
          <div class="form-row-premium">
            <div class="form-group-premium">
              <label class="form-label-premium" for="su-fname">First Name *</label>
              <input type="text" id="su-fname" class="form-input-premium" placeholder="First name" autocomplete="given-name" />
              <div class="form-error" id="fname-error"></div>
            </div>
            <div class="form-group-premium">
              <label class="form-label-premium" for="su-lname">Last Name *</label>
              <input type="text" id="su-lname" class="form-input-premium" placeholder="Last name" autocomplete="family-name" />
              <div class="form-error" id="lname-error"></div>
            </div>
          </div>

          <div class="form-group-premium">
            <label class="form-label-premium" for="su-email">Email Address *</label>
            <div class="input-icon-wrap-premium">
              <span class="input-icon-premium">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="su-email" class="form-input-premium" placeholder="you@domain.com" autocomplete="email" />
            </div>
            <div class="form-error" id="email-error"></div>
          </div>

          <div class="form-group-premium">
            <label class="form-label-premium" for="su-phone">Phone Number *</label>
            <div class="input-icon-wrap-premium">
              <span class="input-icon-premium">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </span>
              <input type="tel" id="su-phone" class="form-input-premium" placeholder="+91 98765 43210" autocomplete="tel" />
            </div>
            <div class="form-error" id="phone-error"></div>
          </div>

          <div class="form-group-premium">
            <label class="form-label-premium" for="su-pw">Password *</label>
            <div class="input-icon-wrap-premium">
              <span class="input-icon-premium">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="su-pw" class="form-input-premium" placeholder="••••••••" autocomplete="new-password" />
              <button type="button" class="input-toggle-premium" id="su-pw-toggle" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon-open"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon-closed" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
              </button>
            </div>
            <div class="form-error" id="pw-error"></div>

            <!-- Password Strength Meter -->
            <div class="strength-meter">
              <div class="strength-meter-bars">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
              </div>
              <span class="strength-label">Password Strength</span>
            </div>
          </div>

          <div class="form-group-premium">
            <label class="form-label-premium" for="su-confirm-pw">Confirm Password *</label>
            <div class="input-icon-wrap-premium">
              <span class="input-icon-premium">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="su-confirm-pw" class="form-input-premium" placeholder="••••••••" autocomplete="new-password" />
              <button type="button" class="input-toggle-premium" id="su-confirm-pw-toggle" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon-open"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon-closed" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
              </button>
            </div>
            <div class="form-error" id="confirm-pw-error"></div>
            <div class="pw-match-label" id="confirm-pw-match"></div>
          </div>

          <div class="checkbox-row">
            <label class="checkbox-label-premium" for="terms-agree">
              <input type="checkbox" id="terms-agree" />
              <span class="checkbox-custom"></span>
              <span>I agree to the <a href="terms.html" target="_blank" style="color:var(--sapphire);font-weight:600">Terms &amp; Conditions</a> and <a href="privacy-policy.html" target="_blank" style="color:var(--sapphire);font-weight:600">Privacy Policy</a></span>
            </label>
          </div>
          <div class="form-error" id="terms-error" style="text-align:left;margin-bottom:var(--space-4)"></div>

          <button type="submit" class="btn-primary-premium">
            <span class="btn-spinner"></span>
            <span>Create Account</span>
          </button>
        </form>

        <div class="auth-links-footer">
          Already have an account? <a href="login.html">Sign In</a>
          <br><br>
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.querySelector('form[data-form="signup"]');
      const suFname = document.getElementById('su-fname');
      const suLname = document.getElementById('su-lname');
      const suEmail = document.getElementById('su-email');
      const suPhone = document.getElementById('su-phone');
      const suPw = document.getElementById('su-pw');
      const suConfirmPw = document.getElementById('su-confirm-pw');
      const suTerms = document.getElementById('terms-agree');
      const submitBtn = form.querySelector('button[type="submit"]');

      // Eye icon toggling for Password
      const suPwToggle = document.getElementById('su-pw-toggle');
      if (suPwToggle) {
        suPwToggle.addEventListener('click', () => {
          const isHidden = suPw.type === 'password';
          suPw.type = isHidden ? 'text' : 'password';
          
          const openIcon = suPwToggle.querySelector('.eye-icon-open');
          const closedIcon = suPwToggle.querySelector('.eye-icon-closed');
          if (openIcon && closedIcon) {
            openIcon.style.display = isHidden ? 'none' : 'inline-block';
            closedIcon.style.display = isHidden ? 'inline-block' : 'none';
          }
        });
      }

      // Eye icon toggling for Confirm Password
      const suConfirmPwToggle = document.getElementById('su-confirm-pw-toggle');
      if (suConfirmPwToggle) {
        suConfirmPwToggle.addEventListener('click', () => {
          const isHidden = suConfirmPw.type === 'password';
          suConfirmPw.type = isHidden ? 'text' : 'password';
          
          const openIcon = suConfirmPwToggle.querySelector('.eye-icon-open');
          const closedIcon = suConfirmPwToggle.querySelector('.eye-icon-closed');
          if (openIcon && closedIcon) {
            openIcon.style.display = isHidden ? 'none' : 'inline-block';
            closedIcon.style.display = isHidden ? 'inline-block' : 'none';
          }
        });
      }

      // Password Strength Calculation
      const checkStrength = (pw) => {
        let score = 0;
        if (!pw) return 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/,test(pw)) { score++; } // wait, check regex
        // Let's rewrite safely below
        return score;
      };

      const calculateStrength = (pw) => {
        let score = 0;
        if (!pw) return 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[a-z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        return score;
      };

      const strengthClasses = ['', 'very-weak', 'weak', 'medium', 'strong', 'very-strong'];
      const strengthLabels = ['', 'Very Weak', 'Weak', 'Medium', 'Strong', 'Very Strong'];

      const updateStrengthMeter = () => {
        const val = suPw.value;
        const score = calculateStrength(val);
        const bars = document.querySelectorAll('.strength-bar');
        const label = document.querySelector('.strength-label');

        bars.forEach((bar, i) => {
          bar.className = 'strength-bar';
          if (val && i < score) {
            bar.classList.add(strengthClasses[score]);
          }
        });

        if (label) {
          label.textContent = val ? `Password Strength: ${strengthLabels[score]}` : 'Password Strength';
        }

        return score;
      };

      suPw.addEventListener('input', () => {
        updateStrengthMeter();
        validateConfirmPassword();
      });

      // Confirm Password Validation
      const matchLabel = document.getElementById('confirm-pw-match');

      const validateConfirmPassword = () => {
        const pw = suPw.value;
        const confirmPw = suConfirmPw.value;

        if (!confirmPw) {
          matchLabel.className = 'pw-match-label';
          matchLabel.style.display = 'none';
          return false;
        }

        if (pw === confirmPw) {
          matchLabel.textContent = 'Passwords Match';
          matchLabel.className = 'pw-match-label match';
          return true;
        } else {
          matchLabel.textContent = 'Passwords Do Not Match';
          matchLabel.className = 'pw-match-label no-match';
          return false;
        }
      };

      suConfirmPw.addEventListener('input', validateConfirmPassword);

      // Standard Form Validation Helpers
      const showError = (input, msg) => {
        input.classList.add('error');
        const group = input.closest('.form-group-premium') || input.closest('.checkbox-row').parentElement;
        const errEl = group.querySelector('.form-error');
        if (errEl) {
          errEl.textContent = msg;
          errEl.style.display = 'block';
        }
      };

      const clearError = (input) => {
        input.classList.remove('error');
        const group = input.closest('.form-group-premium') || input.closest('.checkbox-row').parentElement;
        const errEl = group.querySelector('.form-error');
        if (errEl) {
          errEl.style.display = 'none';
        }
      };

      const validateEmail = (email) => {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      };

      const validatePhone = (phone) => {
        return /^[\d\s\+\-\(\)]{7,15}$/.test(phone);
      };

      // Submit Interceptor
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        e.stopImmediatePropagation();

        let formValid = true;

        // Validate First Name
        if (!suFname.value.trim()) {
          showError(suFname, 'First Name is required');
          formValid = false;
        } else {
          clearError(suFname);
        }

        // Validate Last Name
        if (!suLname.value.trim()) {
          showError(suLname, 'Last Name is required');
          formValid = false;
        } else {
          clearError(suLname);
        }

        // Validate Email
        if (!suEmail.value.trim()) {
          showError(suEmail, 'Email Address is required');
          formValid = false;
        } else if (!validateEmail(suEmail.value.trim())) {
          showError(suEmail, 'Please enter a valid email address');
          formValid = false;
        } else {
          clearError(suEmail);
        }

        // Validate Phone
        if (!suPhone.value.trim()) {
          showError(suPhone, 'Phone Number is required');
          formValid = false;
        } else if (!validatePhone(suPhone.value.trim())) {
          showError(suPhone, 'Please enter a valid phone number');
          formValid = false;
        } else {
          clearError(suPhone);
        }

        // Validate Password Strength
        const score = calculateStrength(suPw.value);
        if (!suPw.value) {
          showError(suPw, 'Password is required');
          formValid = false;
        } else if (score < 4) {
          showError(suPw, 'Please enter a stronger password (must be at least Strong)');
          formValid = false;
        } else {
          clearError(suPw);
        }

        // Validate Confirm Password
        if (!suConfirmPw.value) {
          showError(suConfirmPw, 'Confirm Password is required');
          formValid = false;
        } else if (!validateConfirmPassword()) {
          formValid = false;
        } else {
          clearError(suConfirmPw);
        }

        // Validate Checkbox Terms
        if (!suTerms.checked) {
          const termsErrEl = document.getElementById('terms-error');
          if (termsErrEl) {
            termsErrEl.textContent = 'You must accept the Terms & Conditions';
            termsErrEl.style.display = 'block';
          }
          formValid = false;
        } else {
          const termsErrEl = document.getElementById('terms-error');
          if (termsErrEl) {
            termsErrEl.style.display = 'none';
          }
        }

        if (!formValid) return;

        // Trigger loading state
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        const btnText = submitBtn.querySelector('span:not(.btn-spinner)');
        const originalText = btnText.textContent;
        btnText.textContent = 'Creating Account...';

        setTimeout(() => {
          // Revert loading state
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          btnText.textContent = originalText;

          // Show success Toast using existing Toast notification
          if (window.OptiLuxToast) {
            window.OptiLuxToast.show('Account created! Welcome to OptiLux.', 'success');
          }

          // Reset form
          form.reset();
          updateStrengthMeter();
          matchLabel.className = 'pw-match-label';
          matchLabel.style.display = 'none';
        }, 1500);
      });
    });
  </script>
</body>
</html>
