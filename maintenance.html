<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance — OptiLux Precision Eyewear</title>
  <meta name="description" content="OptiLux is currently undergoing scheduled maintenance. We'll be back shortly with a refined experience." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <style>
    /* Premium Utility Styles */
    .auth-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 50% 50%, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      transition: background 0.3s ease;
      padding-top: var(--nav-height);
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
      position: relative;
    }

    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 580px;
      padding: clamp(2rem, 5vw, 4rem);
      text-align: center;
      transition: var(--transition-base);
      position: relative;
      overflow: hidden;
    }

    .auth-card-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--sapphire);
      background: rgba(42, 157, 143, 0.08);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      margin-bottom: var(--space-4);
    }

    .auth-card-title {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .auth-card-subtitle {
      font-size: var(--text-base);
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
      line-height: 1.6;
      max-width: 460px;
      margin-inline: auto;
    }

    /* Animated SVG Illustration */
    .maint-illustration {
      margin-bottom: var(--space-6);
      display: inline-block;
      color: var(--sapphire);
    }

    .spin-slow-anim {
      animation: spin-slow 12s linear infinite;
    }

    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }

    /* Countdown Timer */
    .maint-countdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      max-width: 380px;
      margin: 0 auto var(--space-8);
    }

    .countdown-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-4);
      text-align: center;
    }

    .countdown-num {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--sapphire);
      line-height: 1;
    }

    .countdown-lbl {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: var(--space-2);
    }

    /* Notification Section */
    .maint-notification {
      border-top: 1px solid var(--border-color);
      padding-top: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .maint-notification-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 600;
      margin-bottom: var(--space-4);
      color: var(--text-primary);
      text-align: left;
    }

    [dir="rtl"] .maint-notification-title {
      text-align: right;
    }

    .maint-notify-form {
      display: flex;
      gap: var(--space-3);
    }

    .input-icon-wrap-premium {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon-premium {
      position: absolute;
      margin-inline-start: var(--space-4);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .form-input-premium {
      width: 100%;
      height: 48px;
      padding-inline-start: 2.75rem;
      padding-inline-end: var(--space-4);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: var(--text-sm);
      transition: var(--transition-base);
    }

    .form-input-premium:focus {
      border-color: var(--sapphire);
      box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.12);
      background: var(--bg-secondary);
    }

    /* Form Error */
    .form-error {
      display: none;
      font-size: var(--text-xs);
      color: var(--rose);
      margin-top: var(--space-1);
      font-weight: 500;
    }

    /* Links Footer */
    .auth-links-footer {
      margin-top: var(--space-4);
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .auth-links-footer a {
      color: var(--sapphire);
      font-weight: 600;
    }

    .auth-links-footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .maint-notify-form {
        flex-direction: column;
      }
      .maint-notify-form .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="preloader-inner">
      <div class="preloader-logo">Opti<span>Lux</span></div>
      <div class="preloader-bar"><div class="preloader-bar-fill"></div></div>
      <div class="preloader-dots"><div class="preloader-dot"></div><div class="preloader-dot"></div><div class="preloader-dot"></div></div>
    </div>
  </div>

  <!-- Page Progress -->
  <div id="page-progress"></div>

  <div class="auth-page-wrapper">
    <!-- ═══ MINIMAL NAVBAR ═══ -->
    <nav class="navbar" role="navigation" aria-label="Authentication navigation">
      <div class="container nav-inner">
        <a href="index.html" class="nav-logo" aria-label="OptiLux Home">
          <div class="nav-logo-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="12" r="4"/><circle cx="18" cy="12" r="4"/><path d="M10 12h4"/><path d="M2 12h0.5"/><path d="M21.5 12h0.5"/></svg>
          </div>
          <div>
            <span class="nav-logo-text">Opti<span>Lux</span></span>
            <span class="nav-logo-sub">Precision Eyewear</span>
          </div>
        </a>

        <div class="nav-actions">
          <button class="nav-icon-btn" data-theme-toggle title="Toggle Dark Mode" aria-label="Toggle theme">
            <span class="icon-moon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
            <span class="icon-sun" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></span>
          </button>
          <button class="nav-icon-btn" data-rtl-toggle title="Toggle RTL" aria-label="Toggle RTL">RTL</button>
        </div>
      </div>
    </nav>

    <!-- ═══ MAIN CARD SECTION ═══ -->
    <main class="auth-main" role="main">
      <div class="auth-card">
        <!-- Animated premium optical gear/lens SVG -->
        <div class="maint-illustration">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="spin-slow-anim">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>

        <span class="auth-card-badge">Scheduled Maintenance</span>
        <h2 class="auth-card-title">We'll Be Back Soon</h2>
        <p class="auth-card-subtitle">We're currently performing scheduled maintenance to improve your experience. Thank you for your patience.</p>

        <!-- Countdown Timer -->
        <div class="maint-countdown">
          <div class="countdown-card">
            <div id="cnt-hours" class="countdown-num">02</div>
            <div class="countdown-lbl">Hours</div>
          </div>
          <div class="countdown-card">
            <div id="cnt-mins" class="countdown-num">30</div>
            <div class="countdown-lbl">Minutes</div>
          </div>
          <div class="countdown-card">
            <div id="cnt-secs" class="countdown-num">00</div>
            <div class="countdown-lbl">Seconds</div>
          </div>
        </div>

        <!-- Notification section -->
        <div class="maint-notification">
          <h3 class="maint-notification-title">Notify Me</h3>
          <form data-form="notify" class="maint-notify-form" novalidate>
            <div class="input-icon-wrap-premium" style="flex: 1;">
              <span class="input-icon-premium">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="notify-email" class="form-input-premium" placeholder="your@email.com" autocomplete="email" />
            </div>
            <button type="submit" class="btn btn-primary">
              <span>Notify Me</span>
            </button>
          </form>
          <div class="form-error" id="notify-error" style="text-align: left; margin-top: var(--space-2);"></div>
        </div>

        <!-- Bottom Action button -->
        <div class="auth-links-footer">
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Countdown logic
      let totalSeconds = 2 * 3600 + 30 * 60; // 2 hours, 30 minutes

      const hoursEl = document.getElementById('cnt-hours');
      const minsEl = document.getElementById('cnt-mins');
      const secsEl = document.getElementById('cnt-secs');

      const updateTimer = () => {
        if (totalSeconds <= 0) {
          if (hoursEl) hoursEl.textContent = '00';
          if (minsEl) minsEl.textContent = '00';
          if (secsEl) secsEl.textContent = '00';
          return;
        }

        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;

        if (hoursEl) hoursEl.textContent = String(h).padStart(2, '0');
        if (minsEl) minsEl.textContent = String(m).padStart(2, '0');
        if (secsEl) secsEl.textContent = String(s).padStart(2, '0');

        totalSeconds--;
      };

      updateTimer();
      const timerInterval = setInterval(updateTimer, 1000);

      // Notification submission logic
      const notifyForm = document.querySelector('form[data-form="notify"]');
      if (notifyForm) {
        const notifyEmail = document.getElementById('notify-email');
        const notifyError = document.getElementById('notify-error');
        const notifyBtn = notifyForm.querySelector('button[type="submit"]');

        notifyForm.addEventListener('submit', (e) => {
          e.preventDefault();
          e.stopImmediatePropagation();

          const emailVal = notifyEmail.value.trim();
          if (!emailVal) {
            notifyEmail.classList.add('error');
            if (notifyError) {
              notifyError.textContent = 'Email Address is required';
              notifyError.style.display = 'block';
            }
            return;
          }

          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailPattern.test(emailVal)) {
            notifyEmail.classList.add('error');
            if (notifyError) {
              notifyError.textContent = 'Please enter a valid email address';
              notifyError.style.display = 'block';
            }
            return;
          }

          // Valid
          notifyEmail.classList.remove('error');
          if (notifyError) notifyError.style.display = 'none';

          // Loading state
          notifyBtn.disabled = true;
          notifyBtn.classList.add('loading');
          const btnText = notifyBtn.querySelector('span');
          const originalText = btnText.textContent;
          btnText.textContent = 'Please wait...';

          setTimeout(() => {
            notifyBtn.disabled = false;
            notifyBtn.classList.remove('loading');
            btnText.textContent = originalText;
            if (window.OptiLuxToast) {
              window.OptiLuxToast.show('Notification registered successfully!', 'success');
            }
            notifyForm.reset();
          }, 1200);
        });
      }
    });
  </script>
</body>
</html>
