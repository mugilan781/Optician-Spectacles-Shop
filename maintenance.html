<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance — OptiLux Precision Eyewear</title>
  <meta name="description" content="OptiLux is currently undergoing scheduled maintenance. We'll be back shortly with a refined experience." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
<section style="min-height:100vh;background:linear-gradient(135deg,var(--graphite-deep),#12100F);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:var(--space-16) var(--space-4)" aria-label="Maintenance Mode">

  <div class="hero-grid-lines" style="opacity:0.3"></div>

  <div style="position:absolute;top:15%;left:15%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(43,78,67,0.1) 0%,transparent 70%);animation:pulse 6s ease-in-out infinite;pointer-events:none"></div>
  <div style="position:absolute;bottom:10%;right:10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(150,124,86,0.08) 0%,transparent 70%);animation:pulse 4s ease-in-out infinite reverse;pointer-events:none"></div>

  <div style="position:relative;z-index:5;text-align:center;max-width:680px;width:100%">

    <!-- Logo -->
    <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;gap:var(--space-3);margin-bottom:var(--space-10)">
      <div class="nav-logo-icon" style="width:56px;height:56px">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="12" r="4"/><circle cx="18" cy="12" r="4"/><path d="M10 12h4"/><path d="M2 12h0.5"/><path d="M21.5 12h0.5"/></svg>
      </div>
      <span style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:900;color:#fff">Opti<span style="color:var(--cyan)">Lux</span></span>
    </a>

    <!-- Animated precision gear SVG -->
    <div style="margin-bottom:var(--space-5);animation:spinSlow 8s linear infinite;display:inline-block;color:var(--cyan)">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>

    <h1 style="font-family:var(--font-display);font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:#fff;line-height:1.15;margin-bottom:var(--space-4)">Atelier <span style="color:var(--cyan)">Calibration</span></h1>
    <p style="color:rgba(255,255,255,0.6);font-size:var(--text-md);line-height:1.75;margin-bottom:var(--space-8);max-width:520px;margin-inline:auto">Our optical suite is undergoing a scheduled diagnostic refresh. We will return online shortly — clearer than ever.</p>

    <!-- Countdown Timer -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);max-width:440px;margin-inline:auto;margin-bottom:var(--space-10)">
      <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-xl);padding:var(--space-4)">
        <div id="cnt-hours" style="font-family:var(--font-display);font-size:var(--text-4xl);font-weight:900;color:var(--cyan);line-height:1">02</div>
        <div style="font-size:var(--text-xs);color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px">Hours</div>
      </div>
      <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-xl);padding:var(--space-4)">
        <div id="cnt-mins" style="font-family:var(--font-display);font-size:var(--text-4xl);font-weight:900;color:var(--cyan);line-height:1">30</div>
        <div style="font-size:var(--text-xs);color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px">Mins</div>
      </div>
      <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-xl);padding:var(--space-4)">
        <div id="cnt-secs" style="font-family:var(--font-display);font-size:var(--text-4xl);font-weight:900;color:var(--cyan);line-height:1">00</div>
        <div style="font-size:var(--text-xs);color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px">Secs</div>
      </div>
      <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-xl);padding:var(--space-4)">
        <div style="color:var(--cyan);margin-bottom:4px">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div style="font-size:var(--text-xs);color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.08em;text-transform:uppercase">Notify</div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div style="margin-bottom:var(--space-8)">
      <div style="display:flex;justify-content:space-between;margin-bottom:var(--space-2)">
        <span style="font-size:var(--text-xs);color:rgba(255,255,255,0.4);font-weight:600">Calibration Progress</span>
        <span style="font-size:var(--text-xs);color:var(--cyan);font-weight:700">78%</span>
      </div>
      <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:var(--radius-full);overflow:hidden">
        <div style="height:100%;width:78%;background:linear-gradient(90deg,var(--sapphire),var(--cyan));border-radius:var(--radius-full)"></div>
      </div>
    </div>

    <!-- Notify Me Form -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-2xl);padding:var(--space-8);margin-bottom:var(--space-8)">
      <h3 style="color:#fff;font-family:var(--font-display);font-size:var(--text-xl);margin-bottom:var(--space-2)">Request Re-opening Notification</h3>
      <p style="color:rgba(255,255,255,0.5);font-size:var(--text-sm);margin-bottom:var(--space-5)">We'll send a notification the moment our portal is restored.</p>
      <form data-form="notify" style="display:flex;gap:var(--space-3)">
        <input type="email" class="form-input" placeholder="your@email.com"
          style="flex:1;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#fff"
          data-validate="required,email" />
        <button type="submit" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Notify Me
        </button>
      </form>
    </div>
  </div>
</section>

<script src="assets/js/main.js"></script>
</body>
</html>
