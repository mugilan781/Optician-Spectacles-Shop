<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — OptiLux Eyewear</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to OptiLux and continue exploring precision eyewear." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
<div id="page-progress"></div>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="12" r="4"/><circle cx="18" cy="12" r="4"/><path d="M10 12h4"/><path d="M2 12h0.5"/><path d="M21.5 12h0.5"/></svg>
      </div>
      <div><span class="nav-logo-text">Opti<span>Lux</span></span><span class="nav-logo-sub">Precision Eyewear</span></div>
    </a>
    <div class="nav-actions">
      <button class="nav-icon-btn" data-theme-toggle>
        <span class="icon-moon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span class="icon-sun" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></span>
      </button>
      <a href="index.html" class="btn btn-primary btn-sm">Back to Home</a>
    </div>
  </div>
</nav>

<!-- ═══ 404 HERO ═══ -->
<section style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,var(--graphite-deep),var(--graphite));position:relative;overflow:hidden;padding:var(--space-16) var(--space-4)" aria-label="404 Error">

  <!-- Background ring decorations -->
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">
    <div style="position:absolute;top:10%;left:10%;width:300px;height:300px;border-radius:50%;border:1px dashed rgba(255,255,255,0.04);animation:spinSlow 40s linear infinite"></div>
    <div style="position:absolute;bottom:10%;right:10%;width:220px;height:220px;border-radius:50%;border:1px dashed rgba(255,255,255,0.04);animation:spinSlow 28s linear infinite reverse"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(2,132,199,0.08) 0%,transparent 70%);pointer-events:none"></div>
  </div>

  <div style="position:relative;z-index:5;max-width:640px">
    <!-- Giant 404 with SVG spectacles overlay -->
    <div style="position:relative;display:inline-block;margin-bottom:var(--space-6)">
      <div style="font-family:var(--font-display);font-size:clamp(8rem,18vw,14rem);font-weight:900;line-height:1;background:linear-gradient(135deg,rgba(2,132,199,0.4),rgba(6,182,212,0.4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.06em;user-select:none">404</div>
      <!-- Floating spectacles SVG icon centered over 404 -->
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.6;animation:float 5s ease-in-out infinite">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="rgba(6,182,212,0.9)" stroke-width="1.5"><circle cx="6" cy="12" r="4"/><circle cx="18" cy="12" r="4"/><path d="M10 12h4"/><path d="M2 12h0.5"/><path d="M21.5 12h0.5"/></svg>
      </div>
    </div>

    <h1 style="font-family:var(--font-display);font-size:var(--text-4xl);font-weight:900;color:#fff;margin-bottom:var(--space-4)">Lens Out of <span style="color:var(--cyan)">Focus</span></h1>
    <p style="color:rgba(255,255,255,0.6);font-size:var(--text-md);line-height:1.75;margin-bottom:var(--space-8);max-width:440px;margin-inline:auto">This page doesn't exist in our optical catalogue. Let us help you find your perfect view.</p>

    <!-- Action buttons -->
    <div class="btn-group" style="justify-content:center;margin-bottom:var(--space-10)">
      <a href="index.html" class="btn btn-primary btn-xl">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a href="contact.html" class="btn btn-glass btn-xl" style="color:#fff;border-color:rgba(255,255,255,0.2)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Contact Us
      </a>
    </div>

    <!-- Quick links -->
    <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:var(--space-8)">
      <p style="color:rgba(255,255,255,0.35);font-size:var(--text-xs);font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:var(--space-4)">Explore Our Pages</p>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:var(--space-2)">
        <a href="services.html" style="padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-full);font-size:var(--text-sm);color:rgba(255,255,255,0.7);transition:all 0.2s;text-decoration:none">Services</a>
        <a href="gallery.html" style="padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-full);font-size:var(--text-sm);color:rgba(255,255,255,0.7);transition:all 0.2s;text-decoration:none">Gallery</a>
        <a href="about.html" style="padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-full);font-size:var(--text-sm);color:rgba(255,255,255,0.7);transition:all 0.2s;text-decoration:none">About</a>
        <a href="blog.html" style="padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-full);font-size:var(--text-sm);color:rgba(255,255,255,0.7);transition:all 0.2s;text-decoration:none">Journal</a>
        <a href="contact.html" style="padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-full);font-size:var(--text-sm);color:rgba(255,255,255,0.7);transition:all 0.2s;text-decoration:none">Contact</a>
        <a href="sitemap.html" style="padding:0.4rem 1rem;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-full);font-size:var(--text-sm);color:rgba(255,255,255,0.7);transition:all 0.2s;text-decoration:none">Sitemap</a>
      </div>
    </div>

    <!-- Countdown to redirect -->
    <p style="color:rgba(255,255,255,0.25);font-size:var(--text-xs);margin-top:var(--space-8)">
      Auto-redirecting in <span id="countdown" style="color:var(--cyan);font-weight:700">30</span>s &nbsp;·&nbsp;
      <a href="index.html" style="color:rgba(255,255,255,0.4);font-size:var(--text-xs)">go now</a>
    </p>
  </div>
</section>

<script src="assets/js/main.js"></script>
<script>
  let count = 30;
  const el = document.getElementById('countdown');
  const timer = setInterval(() => {
    count--;
    if (el) el.textContent = count;
    if (count <= 0) { clearInterval(timer); window.location.href = 'index.html'; }
  }, 1000);
</script>
</body>
</html>
