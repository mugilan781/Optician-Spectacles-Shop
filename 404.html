<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — OptiLux Eyewear</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to OptiLux and continue exploring precision eyewear." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <style>
    /* Premium Utility Styles */
    .auth-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 50% 50%, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      transition: background 0.3s ease;
      padding-top: var(--nav-height);
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
      position: relative;
    }

    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 580px;
      padding: clamp(2rem, 6vw, 4rem);
      text-align: center;
      transition: var(--transition-base);
      position: relative;
      overflow: hidden;
    }

    .auth-card-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--sapphire);
      background: rgba(42, 157, 143, 0.08);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      margin-bottom: var(--space-4);
      position: relative;
      z-index: 1;
    }

    .auth-card-title {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
      position: relative;
      z-index: 1;
    }

    .auth-card-subtitle {
      font-size: var(--text-base);
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
      line-height: 1.6;
      max-width: 440px;
      margin-inline: auto;
      position: relative;
      z-index: 1;
    }

    /* Background Translucent 404 */
    .bg-text-404 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-display);
      font-size: clamp(8rem, 25vw, 15rem);
      font-weight: 900;
      color: var(--text-primary);
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      letter-spacing: -0.05em;
    }

    /* Buttons Group */
    .btn-group-centered {
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 480px) {
      .btn-group-centered {
        flex-direction: column;
        align-items: stretch;
      }
      .btn-group-centered .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="preloader-inner">
      <div class="preloader-logo">Opti<span>Lux</span></div>
      <div class="preloader-bar"><div class="preloader-bar-fill"></div></div>
      <div class="preloader-dots"><div class="preloader-dot"></div><div class="preloader-dot"></div><div class="preloader-dot"></div></div>
    </div>
  </div>

  <!-- Page Progress -->
  <div id="page-progress"></div>

  <div class="auth-page-wrapper">
    <!-- ═══ MINIMAL NAVBAR ═══ -->
    <nav class="navbar" role="navigation" aria-label="Authentication navigation">
      <div class="container nav-inner">
        <a href="index.html" class="nav-logo" aria-label="OptiLux Home">
          <div class="nav-logo-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="12" r="4"/><circle cx="18" cy="12" r="4"/><path d="M10 12h4"/><path d="M2 12h0.5"/><path d="M21.5 12h0.5"/></svg>
          </div>
          <div>
            <span class="nav-logo-text">Opti<span>Lux</span></span>
            <span class="nav-logo-sub">Precision Eyewear</span>
          </div>
        </a>

        <div class="nav-actions">
          <button class="nav-icon-btn" data-theme-toggle title="Toggle Dark Mode" aria-label="Toggle theme">
            <span class="icon-moon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
            <span class="icon-sun" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></span>
          </button>
          <button class="nav-icon-btn" data-rtl-toggle title="Toggle RTL" aria-label="Toggle RTL">RTL</button>
        </div>
      </div>
    </nav>

    <!-- ═══ MAIN 404 CARD SECTION ═══ -->
    <main class="auth-main" role="main">
      <div class="auth-card">
        <!-- Translucent 404 Backdrop -->
        <div class="bg-text-404">404</div>

        <span class="auth-card-badge">ERROR 404</span>
        <h2 class="auth-card-title">Page Not Found</h2>
        <p class="auth-card-subtitle">The page you are looking for may have been moved, renamed or no longer exists.</p>

        <!-- Buttons Centered -->
        <div class="btn-group-centered">
          <a href="index.html" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Back to Home</span>
          </a>
          <a href="contact.html" class="btn btn-secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <span>Contact Us</span>
          </a>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
